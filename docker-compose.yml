services:
  questdb:
    image: questdb/questdb:latest
    container_name: pnf_questdb
    ports:
      - "${QUESTDB_HTTP_PORT:-19000}:9000"
      - "${QUESTDB_ILP_PORT:-19009}:9009"
      - "${QUESTDB_PG_PORT:-18812}:8812"
    volumes:
      - questdb_data:/var/lib/questdb
    restart: unless-stopped

volumes:
  questdb_data:
